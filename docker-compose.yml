services:
  # ChromaDB vector database
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/data
    environment:
      - CHROMADB_PATH=/data
      - CHROMADB_HOST=0.0.0.0
      - CHROMADB_PORT=8000
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; r=requests.get('http://localhost:8000/api/v1/heartbeat', timeout=5); exit(0 if r.status_code==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Alert Analysis RAG System FastAPI server
  alert-analyzer-api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alert-analyzer-api
    ports:
      - "8002:8002"
    environment:
      # Server configuration
      - ALERT_HOST=0.0.0.0
      - ALERT_PORT=8002
      - ALERT_RELOAD=false
      
      # Ollama configuration (uses local Ollama on host)
      - ALERT_OLLAMA_HOST=http://host.docker.internal:11434
      - ALERT_OLLAMA_TIMEOUT=60
      - ALERT_OLLAMA_CONCURRENCY=4
      - ALERT_EMBED_MODEL=qwen3-embedding:0.6b
      - ALERT_LLM_MODEL=ornith:latest
      - ALERT_LLM_TEMPERATURE=0.1
      - ALERT_LLM_MAX_TOKENS=2048
      
      # ChromaDB configuration
      - ALERT_CHROMADB_PATH=/data/chromadb
      - ALERT_CHROMADB_HOST=chromadb
      - ALERT_CHROMADB_PORT=8000
      
      # Application logging and monitoring
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      
      # Security settings
      - UVICORN_WORKERS=2
      - UVICORN_ACCESS_LOG=-
    volumes:
      - chromadb_data:/data
      - ./logs:/app/logs
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  # Nginx reverse proxy (optional - for SSL termination and routing)
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./logs/nginx:/var/log/nginx
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      alert-analyzer-api:
        condition: service_healthy
    command: /bin/sh -c "nginx -g 'daemon off;'"
    restart: unless-stopped

volumes:
  chromadb_data:
  nginx_ssl:

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16