version: '3.8'

services:
  # Ollama service for LLM and embeddings
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    # Health check for Ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Alert Analysis RAG System FastAPI server
  alert-analyzer-api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alert-analyzer-api
    ports:
      - "8002:8002"
    environment:
      - ALERT_OLLAMA_HOST=http://ollama:11434
      - ALERT_EMBED_MODEL=qwen3-embedding:0.6b
      - ALERT_LLM_MODEL=ornith:latest
      - ALERT_OLLAMA_CONCURRENCY=4
      - ALERT_OLLAMA_TIMEOUT=60
      - ALERT_LLM_TEMPERATURE=0.1
      - ALERT_LLM_MAX_TOKENS=2048
      - ALERT_CHROMADB_PATH=/data/chromadb
    volumes:
      - chromadb_data:/data
      - ./logs:/app/logs
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Alert Analysis RAG System GUI client
  alert-analyzer-gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    container_name: alert-analyzer-gui
    ports:
      - "8080:8080"
    environment:
      - ALERT_GUI_BASE_URL=http://alert-analyzer-api:8002
    depends_on:
      alert-analyzer-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3