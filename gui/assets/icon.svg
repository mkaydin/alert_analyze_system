<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#1e3a5f" stroke="#2d6ab0" stroke-width="8"/>
  
  <!-- Shield shape -->
  <path d="M256 48 L464 144 L464 352 L256 464 L48 352 L48 144 Z" 
        fill="#2d6ab0" stroke="#4aa3f5" stroke-width="6"/>
  
  <!-- Magnifying glass -->
  <g transform="translate(120, 120) scale(0.8)">
    <!-- Lens -->
    <circle cx="120" cy="120" r="80" fill="#e8f0fe" stroke="#4aa3f5" stroke-width="4"/>
    <!-- Lens reflection -->
    <circle cx="100" cy="100" r="20" fill="#ffffff" opacity="0.3"/>
    <!-- Handle -->
    <path d="M200 200 L280 280" stroke="#4aa3f5" stroke-width="8" stroke-linecap="round"/>
    <!-- Crosshair in lens -->
    <line x1="120" y1="60" x2="120" y2="180" stroke="#4aa3f5" stroke-width="2" opacity="0.6"/>
    <line x1="60" y1="120" x2="180" y2="120" stroke="#4aa3f5" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Alert/analysis lines on the right side of shield -->
  <g transform="translate(320, 180)">
    <rect x="0" y="0" width="80" height="8" rx="4" fill="#4aa3f5" opacity="0.9"/>
    <rect x="0" y="20" width="60" height="8" rx="4" fill="#4aa3f5" opacity="0.7"/>
    <rect x="0" y="40" width="70" height="8" rx="4" fill="#4aa3f5" opacity="0.5"/>
    <rect x="0" y="60" width="50" height="8" rx="4" fill="#4aa3f5" opacity="0.3"/>
  </g>
  
  <!-- Warning/alert indicator small -->
  <g transform="translate(256, 120)">
    <path d="M0 -30 L-15 10 L15 10 Z" fill="#ffcc00" stroke="#ff8800" stroke-width="3"/>
    <line x1="0" y1="-5" x2="0" y2="10" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="22" r="3" fill="#333"/>
  </g>
</svg>