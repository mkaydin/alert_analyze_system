# Nginx configuration for Alert Analysis RAG System
# Provides reverse proxy with SSL termination and routing

# Upstream definitions
upstream api_backend {
    server alert-analyzer-api:8002;
    keepalive 32;
}

# HTTP server
server {
    listen 80;
    server_name localhost;
    
    # Health check endpoint (no redirect)
    location /health {
        access_log off;
        proxy_pass http://api_backend/api/v1/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # API routes
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }
    
    # Default: serve a simple page or redirect
    location / {
        return 200 'Alert Analyzer API is running. Use the local GUI app (python -m gui.app) or API at /api/';
        add_header Content-Type text/plain;
    }
}

